[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  ".codex",
  ".venv",
  "node_modules",
  "services/api/orbit_api/builtin_strategies/expert_v69",
  "services/api/orbit_api/builtin_strategies/kaggle_structured_v11",
]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
exclude = [
  "/.venv/",
  "/node_modules/",
  "/.codex/",
  "services/api/orbit_api/builtin_strategies/expert_v69/",
  "services/api/orbit_api/builtin_strategies/kaggle_structured_v11/",
]

[tool.pytest.ini_options]
addopts = "-q --import-mode=importlib"
testpaths = [
  "services/api/tests",
  "services/match-worker/tests",
  "services/agent-sandbox/tests",
  "packages/orbit-engine-py/tests",
  "packages/platform-runtime-py/tests",
  "packages/contracts/python-tests",
]

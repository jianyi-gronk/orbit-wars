[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "orbit-wars-contracts"
version = "0.1.0"
description = "Versioned cross-process contracts for Orbit Wars."
requires-python = ">=3.11"
dependencies = ["pydantic==2.13.4"]

[tool.setuptools.packages.find]
include = ["orbit_contracts*"]
